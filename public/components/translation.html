    <script>
    (function() {
        if (window._vdartTranslationInitialized) return;
        const sourceText = document.getElementById('source-text');
        const targetText = document.getElementById('target-text');
        const sourceLang = document.getElementById('source-lang');
        const targetLang = document.getElementById('target-lang');
        const translateBtn = document.getElementById('translate-btn');
        const swapBtn = document.getElementById('swap-langs');
        const speakSource = document.getElementById('speak-source');
        const speakTarget = document.getElementById('speak-target');
        const copyTarget = document.getElementById('copy-target');
        const clearSource = document.getElementById('clear-source');
        const historyList = document.getElementById('history-list');

        let translationHistory = JSON.parse(localStorage.getItem('vdart_translation_history') || '[]');

        // Load history
        loadHistory();

        // Translate button
        translateBtn.addEventListener('click', async () => {
            const text = sourceText.value.trim();
            if (!text) return;

            translateBtn.textContent = 'Translating...';
            translateBtn.disabled = true;

            try {
                const result = await translateText(text, sourceLang.value, targetLang.value);
                targetText.value = result.translation;

                // Add to history
                addToHistory(text, result.translation, sourceLang.value, targetLang.value);
            } catch (error) {
                targetText.value = 'Translation failed. Please try again.';
                console.error('Translation error:', error);
            }

            translateBtn.textContent = 'Translate';
            translateBtn.disabled = false;
        });

        // Swap languages
        swapBtn.addEventListener('click', () => {
            const tempLang = sourceLang.value;
            const tempText = sourceText.value;

            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;
            sourceText.value = targetText.value;
            targetText.value = tempText;
        });

        // Speak source
        speakSource.addEventListener('click', () => {
            if (sourceText.value) {
                speakText(sourceText.value, sourceLang.value);
            }
        });

        // Speak target
        speakTarget.addEventListener('click', () => {
            if (targetText.value) {
                speakText(targetText.value, targetLang.value);
            }
        });

        // Copy target
        copyTarget.addEventListener('click', () => {
            if (targetText.value) {
                navigator.clipboard.writeText(targetText.value);
                copyTarget.textContent = 'Copied!';
                setTimeout(() => copyTarget.textContent = '📋 Copy', 2000);
            }
        });

        // Clear source
        clearSource.addEventListener('click', () => {
            sourceText.value = '';
            targetText.value = '';
        });

        async function translateText(text, from, to) {
            const formal = document.getElementById('formal-tone').checked;
            const cultural = document.getElementById('cultural-context').checked;
            const business = document.getElementById('business-context').checked;

            const context = [];
            if (formal) context.push('formal');
            if (cultural) context.push('cultural sensitivity');
            if (business) context.push('business professional');

            const prompt = `Translate the following text from ${getLanguageName(from)} to ${getLanguageName(to)}. ${context.length ? `Consider the following context: ${context.join(', ')}.` : ''} Provide only the translation, no explanations.

Text: "${text}"`;

            const response = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: localStorage.getItem('vdart_user_id') || 'anonymous',
                    message: prompt
                })
            });

            const data = await response.json();
            return { translation: data.response || 'Translation failed' };
        }

        function speakText(text, lang) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            speechSynthesis.speak(utterance);
        }

        function getLanguageName(code) {
            const langs = {
                en: 'English', es: 'Spanish', fr: 'French', de: 'German',
                it: 'Italian', pt: 'Portuguese', ru: 'Russian', ja: 'Japanese',
                ko: 'Korean', zh: 'Chinese', ar: 'Arabic', hi: 'Hindi'
            };
            return langs[code] || code;
        }

        function addToHistory(source, target, from, to) {
            const item = {
                source, target, from, to, timestamp: Date.now()
            };
            translationHistory.unshift(item);
            translationHistory = translationHistory.slice(0, 10); // Keep last 10
            localStorage.setItem('vdart_translation_history', JSON.stringify(translationHistory));
            loadHistory();
        }

        function loadHistory() {
            historyList.innerHTML = '';
            translationHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div><strong>${getLanguageName(item.from)} → ${getLanguageName(item.to)}</strong></div>
                    <div class="history-text">${item.source.substring(0, 50)}${item.source.length > 50 ? '...' : ''}</div>
                `;
                div.addEventListener('click', () => {
                    sourceText.value = item.source;
                    targetText.value = item.target;
                    sourceLang.value = item.from;
                    targetLang.value = item.to;
                });
                historyList.appendChild(div);
            });
        }
    })();
    </script>
