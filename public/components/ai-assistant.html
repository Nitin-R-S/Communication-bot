    <div class="feature-panels" id="ai-assistant-panel">
        <div class="panel-header">
            <div>
                <h2 class="panel-title">🤖 AI Assistant</h2>
                <p style="color: var(--gray);">Powered by Llama 3 with RAG & Memory</p>
            </div>
            <button class="close-panel" onclick="closePanel()">×</button>
        </div>
        <div class="panel-content" style="height: calc(100vh - 120px); display: flex; flex-direction: column;">
            <div style="padding: 1rem; background: var(--glass); border-radius: 8px; margin-bottom: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span><strong>🤖 Ollama Status:</strong> <span id="ai-status">Checking...</span></span>
                    <button class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="checkAIStatus()">↻ Refresh</button>
                </div>
                <p style="color: var(--gray); font-size: 0.85rem; margin-top: 0.5rem;">
                    💡 Ask about VDart services, pricing, features, or any communication tips!
                </p>
            </div>
            <div id="ai-messages" style="flex: 1; overflow-y: auto; padding: 1rem; background: var(--glass); border-radius: 8px; margin-bottom: 1rem;">
                <div class="ai-message info">💬 Hi! I'm your VDart AI Assistant. Ask me anything about our services, pricing, or get communication tips!</div>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="ai-input" placeholder="Type your message..." style="flex: 1; padding: 1rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--light); font-size: 1rem;">
                <button class="btn btn-primary" onclick="sendAIMessage()">Send</button>
                <button class="btn btn-secondary" onclick="clearAIHistory()">Clear</button>
            </div>
        </div>
    </div>
